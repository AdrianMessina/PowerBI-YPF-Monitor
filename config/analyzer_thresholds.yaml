# Configuración de umbrales y pesos para análisis de reportes Power BI
# Basado en: https://learn.microsoft.com/es-es/power-bi/guidance/power-bi-optimization
# Sistema de scoring agrupado por dimensiones de calidad (v2.0)

version: "2.0"

# ════════════════════════════════════════════════════════════════════
# Umbrales por métrica (good / warning / critical)
# ════════════════════════════════════════════════════════════════════
thresholds:
  visualizations_per_page:
    good: 10
    warning: 15
    critical: 20
    description: "Número de visualizaciones por página"
    recommendation: "Limitar a 10 visuales por página para mejor rendimiento"

  filters_per_page:
    good: 5
    warning: 8
    critical: 12
    description: "Número de filtros por página"
    recommendation: "Usar máximo 5 filtros por página, considerar jerarquías"

  custom_visuals:
    good: 3
    warning: 5
    critical: 8
    description: "Número de custom visuals en el reporte"
    recommendation: "Los custom visuals pueden impactar rendimiento, usar solo cuando sea necesario"

  embedded_images_mb:
    good: 1.0
    warning: 5.0
    critical: 10.0
    description: "Tamaño total de imágenes embebidas (MB)"
    recommendation: "Usar imágenes externas o comprimidas, evitar imágenes de alta resolución"

  total_pages:
    good: 10
    warning: 20
    critical: 30
    description: "Número total de páginas en el reporte"
    recommendation: "Dividir reportes grandes en múltiples archivos o usar bookmarks"

  dax_measures_complex:
    good: 20
    warning: 40
    critical: 60
    description: "Número de medidas DAX complejas"
    recommendation: "Optimizar medidas complejas, evitar iteradores innecesarios"

  tables_in_model:
    good: 15
    warning: 30
    critical: 50
    description: "Número de tablas en el modelo"
    recommendation: "Consolidar tablas cuando sea posible, usar vistas en la fuente"

  relationships:
    good: 20
    warning: 40
    critical: 60
    description: "Número de relaciones en el modelo"
    recommendation: "Simplificar el modelo, evitar relaciones bidireccionales innecesarias"

  bidirectional_relationships:
    good: 0
    warning: 2
    critical: 5
    description: "Número de relaciones bidireccionales"
    recommendation: "Evitar relaciones bidireccionales, usar CROSSFILTER() en medidas específicas"

  calculated_columns:
    good: 10
    warning: 20
    critical: 50
    description: "Número de columnas calculadas"
    recommendation: "Mover cálculos a Power Query o usar medidas cuando sea posible"

  model_size_mb:
    good: 500
    warning: 1000
    critical: 2000
    description: "Tamaño del modelo en MB"
    recommendation: "Optimizar modelo, eliminar columnas no usadas, revisar cardinalidad"

# ════════════════════════════════════════════════════════════════════
# Pesos individuales por métrica (suman 1.00)
# Distribuidos para alimentar las 4 categorías de calidad
# ════════════════════════════════════════════════════════════════════
weights:
  # Modelo Semántico — 35%
  tables_in_model: 0.10
  relationships: 0.05
  bidirectional_relationships: 0.10
  calculated_columns: 0.05
  model_size_mb: 0.05

  # DAX / Performance — 25%
  dax_measures_complex: 0.25

  # Diseño del Reporte — 25%
  visualizations_per_page: 0.09
  filters_per_page: 0.08
  embedded_images_mb: 0.08

  # Gobernanza / Mantenibilidad — 15%
  custom_visuals: 0.08
  total_pages: 0.07

# ════════════════════════════════════════════════════════════════════
# Dimensiones de calidad — agrupación por categoría
# El score de cada categoría es promedio ponderado de sus métricas
# ════════════════════════════════════════════════════════════════════
categories:
  modelo_semantico:
    label: "Modelo Semántico"
    icon: "structure"
    weight: 0.35
    description: "Cimiento del reporte: tablas, relaciones, columnas calculadas y tamaño del modelo. Mide la calidad estructural del diseño de datos."
    metrics:
      - tables_in_model
      - relationships
      - bidirectional_relationships
      - calculated_columns
      - model_size_mb

  dax_performance:
    label: "DAX / Performance"
    icon: "speed"
    weight: 0.25
    description: "Calidad de las medidas DAX y su impacto en el rendimiento. Detecta medidas complejas que pueden ralentizar el reporte."
    metrics:
      - dax_measures_complex

  diseno_reporte:
    label: "Diseño del Reporte"
    icon: "layout"
    weight: 0.25
    description: "Composición visual del reporte: densidad de visuales por página, filtros activos e imágenes embebidas que impactan el peso del archivo."
    metrics:
      - visualizations_per_page
      - filters_per_page
      - embedded_images_mb

  gobernanza:
    label: "Gobernanza / Mantenibilidad"
    icon: "shield"
    weight: 0.15
    description: "Prácticas que afectan la mantenibilidad a largo plazo: uso responsable de custom visuals y cantidad razonable de páginas para navegación."
    metrics:
      - custom_visuals
      - total_pages

# ════════════════════════════════════════════════════════════════════
# Umbrales de score global (alineados con Power BI Fixer)
# ════════════════════════════════════════════════════════════════════
scoring:
  excellent: 90    # 90-100  Excelente
  good: 75         # 75-89   Bueno
  warning: 60      # 60-74   Atención
  poor: 0          # 0-59    Crítico

# ════════════════════════════════════════════════════════════════════
# Reglas adicionales (informativas)
# ════════════════════════════════════════════════════════════════════
rules:
  - id: "avoid_bidirectional"
    name: "Evitar relaciones bidireccionales"
    severity: "warning"
    description: "Las relaciones bidireccionales pueden causar ambigüedad y afectar rendimiento"

  - id: "use_star_schema"
    name: "Preferir esquema estrella"
    severity: "info"
    description: "El esquema estrella es más eficiente que esquemas de copo de nieve complejos"

  - id: "limit_calculated_columns"
    name: "Limitar columnas calculadas"
    severity: "warning"
    description: "Preferir medidas sobre columnas calculadas cuando sea posible"

  - id: "optimize_visual_interactions"
    name: "Optimizar interacciones visuales"
    severity: "info"
    description: "Deshabilitar interacciones innecesarias entre visuales"
